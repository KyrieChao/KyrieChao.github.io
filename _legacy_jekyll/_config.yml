title: KyrieChao 的博客
description: 技术探索与生活记录
url: "https://KyrieChao.github.io"
lang: zh-CN
locale: zh-CN
permalink: /:categories/:title/
paginate: 5
paginate_path: "/page:num/"

repository: KyrieChao/KyrieChao.github.io
minimal_mistakes_skin: contrast
search: true


archives:
  enable: true
  permalink: /year-archive/

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

author:
  name: "Kyrie Chao"
  avatar: /assets/images/chao.jpg
  bio: "热爱技术与生活，记录点滴。"
  location: "China"
  links:
    - label: "GitHub"
      url: "https://github.com/KyrieChao"
      icon: "fab fa-github"
    - label: "Email"
      url: "mailto:chao893760@163.com"
      icon: "fas fa-fw fa-envelope-square"

footer:
  links:
    - label: "GitHub"
      url: "https://github.com/KyrieChao"
      icon: "fab fa-fw fa-github"
    - label: "RSS"
      url: "/feed.xml"
      icon: "fas fa-fw fa-rss"
    - label: "CC BY-NC 4.0"
      url: "https://creativecommons.org/licenses/by-nc/4.0/"
      icon: "fab fa-fw fa-creative-commons"

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-XXXXXXXXXX" # 替换为你的 Google Analytics ID

# 覆盖默认布局为无侧边栏
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      classes: "wide"  # ← 关键！启用宽屏
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      classes: "wide"
      author_profile: false  # 全局关闭作者侧边栏（我们自己控制位置）

comments:
  provider: "utterances"
  utterances:
    repo: "KyrieChao/KyrieChao.github.io"
    issue_term: "pathname"
    label: "comments"
    theme: "preferred-color-scheme"

collections:
  posts:
    output: true

exclude:
  - vendor
  - Gemfile.lock
